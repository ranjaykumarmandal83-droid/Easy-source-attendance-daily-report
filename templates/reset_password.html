<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password – HRMS</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060912;--accent:#00c896;--text:#e8edf5;--muted:#55607a}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:rgba(12,18,35,.95);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:36px 32px;width:100%;max-width:400px}
.title{font-size:22px;font-weight:800;margin-bottom:6px}
.sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:13px 16px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;margin-bottom:14px}
.inp:focus{border-color:var(--accent)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#00a87a);border:none;border-radius:11px;color:#060912;font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;cursor:pointer}
.err{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:14px}
.back{display:block;text-align:center;margin-top:18px;color:var(--muted);font-size:13px;text-decoration:none}
.back:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="box">
  <div class="title">🔑 Naya Password Set Karo</div>
  <div class="sub">Apna naya password enter karo</div>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="POST">
    <input class="inp" type="password" name="new_password" placeholder="Naya password (min 4 chars)" required autocapitalize="none" autocorrect="off">
    <button class="btn" type="submit">✅ Password Reset Karo</button>
  </form>
  <a href="/login" class="back">← Login par jaao</a>
</div>
</body>
</html>
