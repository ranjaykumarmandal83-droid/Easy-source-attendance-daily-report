<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password – HRMS</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060912;--accent:#00c896;--text:#e8edf5;--muted:#55607a}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:rgba(12,18,35,.95);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 30px 70px rgba(0,0,0,.5)}
.title{font-size:22px;font-weight:800;margin-bottom:6px}
.sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:13px 16px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;margin-bottom:14px}
.inp:focus{border-color:var(--accent)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#00a87a);border:none;border-radius:11px;color:#060912;font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;cursor:pointer}
.msg{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px}
.msg.success{background:rgba(0,200,150,.1);color:var(--accent);border:1px solid rgba(0,200,150,.2)}
.msg.error{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.back{display:block;text-align:center;margin-top:18px;color:var(--muted);font-size:13px;text-decoration:none}
.back:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="box">
  <div class="title">🔐 Password Reset</div>
  <div class="sub">Enter your registered email — a reset link will be sent</div>

  {% if msg %}
  <div class="msg {{ msg[0] }}">{{ msg[1] }}</div>
  {% endif %}

  {% if not msg or msg[0] == 'error' %}
  <form method="POST">
    <input class="inp" type="email" name="email" placeholder="your@email.com" required autocapitalize="none">
    <button class="btn" type="submit">📧 Send Reset Link</button>
  </form>
  {% endif %}

  <a href="/login" class="back">← Back to Login</a>
</div>
</body>
</html>
